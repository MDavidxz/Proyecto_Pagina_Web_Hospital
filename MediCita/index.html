<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCita</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  
  <div class="container">

    <!-- Logo -->
    <div class="logo">
      <img src="x3Dom-removebg-preview.png" alt="Logo MediCita" width="150">
    </div>

    <h1>INICIAR SESIÓN</h1>
    <h2>Accede a tu cuenta de MediCita</h2>

    <!-- Formulario de login -->
    <div class="login-container">

      <div class="input-group">
        <span class="icon">👤</span>
        <input type="text" placeholder="Usuario">
      </div>

      <div class="input-group">
        <span class="icon">🔒</span>
        <input type="password" placeholder="Contraseña">
      </div>

      <button class="boton">INGRESAR</button>

      <p class="link">¿Olvidó su contraseña?</p>
      <p class="link">¿Nuevo paciente? <a href="#">REGÍSTRATE AQUÍ</a></p>

    </div>

  </div>

</body>
</html>
